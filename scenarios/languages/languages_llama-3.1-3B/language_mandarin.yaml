name: llama_3.1_3b_mandarin
model:
  id: meta-llama/Llama-3.2-3B-Instruct
  dtype: float16
  device: auto
prompt:
  run_at_each_message: false
  messages:
    - role: system
      content: "You are a helpful assistant"
    - role: user
      content: "天空是什么颜色的"    
generation:
  max_new_tokens: 10
  do_sample: false
  seed: 42
  temperature: 0
capture:
  hidden_states: true
  attention_weights: true
  qkv: true
  mlp: true
  logits: true
  top_k_probs: 20
  layers: all
  store_dtype: float16
output:
  dir: ./runs
  format: json+npz
