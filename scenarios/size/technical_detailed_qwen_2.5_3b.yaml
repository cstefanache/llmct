name: technical_detailed_qwen_3b
model:
  id: Qwen/Qwen2.5-3B-Instruct
  dtype: float16
  device: auto
prompt:
  run_at_each_message: false
  messages:
    - role: system
      content: "You are a helpful assistant"
    - role: user
      content: "What is the meaning of: Deep within the chilled aisles of the data center, countless servers hum in a relentless, synchronized chorus of computational power. As a single search query is submitted from a distant device, an intricate cascade of digital events is instantly set into motion. Packets of encoded information shatter into microscopic fragments, darting through vast webs of glass fiber at a fraction of the speed of light. These ethereal pulses navigate a labyrinth of routers and switches, finding the most efficient path across oceans and continents in mere milliseconds. Upon arriving at the primary database, highly optimized algorithms sift through petabytes of indexed knowledge with astonishing precision. The system evaluates billions of potential matches, rapidly discarding irrelevant nodes while assembling the most accurate fragments of data. Massive cooling fans roar to life, dissipating the immense heat generated by the silicon processors working at maximum capacity. Small LED indicators blink furiously in a rhythmic dance, flashing brilliant shades of green and vibrant blue as the information is rapidly compiled. Once the optimal result is constructed, the entire process reverses, sending the packaged response hurtling back through the global infrastructure. Finally, the requested data materializes on the user’s screen, completing a highly complex journey that feels instantaneous to the human eye."    
generation:
  max_new_tokens: 50
  do_sample: false
  seed: 42
  temperature: 0
capture:
  hidden_states: true
  attention_weights: true
  qkv: true
  mlp: true
  logits: true
  top_k_probs: 20
  layers: all
  store_dtype: float16
output:
  dir: ./runs
  format: json+npz
