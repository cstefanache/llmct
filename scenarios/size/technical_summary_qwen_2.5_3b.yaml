name: technical_summary_qwen_3b
model:
  id: Qwen/Qwen2.5-3B-Instruct
  dtype: float16
  device: auto
prompt:
  run_at_each_message: false
  messages:
    - role: system
      content: "You are a helpful assistant"
    - role: user
      content: "What is the meaning of: When a digital query is submitted, data packets instantly traverse a global network of fiber optics, prompting powerful servers to process the request by sifting through massive databases with astonishing precision. The optimized results are then rapidly compiled and transmitted back across the infrastructure, appearing on the user's screen in a matter of milliseconds."    
generation:
  max_new_tokens: 50
  do_sample: false
  seed: 42
  temperature: 0
capture:
  hidden_states: true
  attention_weights: true
  qkv: true
  mlp: true
  logits: true
  top_k_probs: 20
  layers: all
  store_dtype: float16
output:
  dir: ./runs
  format: json+npz
